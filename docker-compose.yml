services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pipeline_manager
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pipeline_manager"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
