# ============================================================
# FASE 8 — Docker Compose: Orquestación local completa
# ============================================================
# Levanta toda la aplicación con: docker compose up --build
# Para el fondo: docker compose up -d --build
# Para detener: docker compose down

services:

  # ── Servicio 1: Base de datos PostgreSQL ─────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pipeline_manager
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pipeline_manager"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Servicio 2: API FastAPI ───────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Sobreescribir DATABASE_URL para apuntar al servicio 'db' interno
      DATABASE_URL: "postgresql+psycopg://postgres:postgres@db:5432/pipeline_manager"
    depends_on:
      db:
        condition: service_healthy
    # Recargar automáticamente en desarrollo (quitar en producción)
    volumes:
      - ./src:/app/src
      - ./alembic:/app/alembic

volumes:
  postgres_data:
